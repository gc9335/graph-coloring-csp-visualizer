
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>算法博弈：单步开销 vs 全局效率</title>
    <style>
        :root {
            --v0: #cbd5e1; --v1: #fca5a5; --v2: #93c5fd; 
            --v3: #c4b5fd; --v4: #fcd34d; --v5: #86efac;
            --bg: #f8fafc; --text: #1e293b;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 30px; padding: 20px; background: #f1f5f9; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; font-size: 0.9em; }
        select, input { padding: 8px; border: 1px solid #cbd5e1; border-radius: 4px; }
        
        .dashboard { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; min-height: 400px; }
        .panel { border: 1px solid #e2e8f0; border-radius: 8px; padding: 20px; display: flex; flex-direction: column; }
        .panel-title { font-weight: bold; margin-bottom: 15px; border-left: 4px solid #3b82f6; padding-left: 10px; }
        
        /* Tree Visualization Area */
        #tree-viz { flex-grow: 1; display: flex; align-items: center; justify-content: center; position: relative; background: #fafafa; border-radius: 4px; overflow: hidden; }
        .node { width: 12px; height: 12px; background: #64748b; border-radius: 50%; position: absolute; }
        .branch { position: absolute; background: #e2e8f0; transform-origin: top center; width: 2px; }

        /* Stats Bar Chart */
        .bar-container { display: flex; flex-direction: column; gap: 15px; justify-content: center; flex-grow: 1; }
        .bar-row { display: flex; align-items: center; gap: 10px; }
        .bar-label { width: 80px; font-size: 0.85em; text-align: right; }
        .bar-wrapper { flex-grow: 1; background: #f1f5f9; height: 24px; border-radius: 12px; overflow: hidden; position: relative; }
        .bar-fill { height: 100%; transition: width 0.5s ease-out; }
        .bar-value { position: absolute; right: 8px; top: 2px; font-size: 0.75em; font-weight: bold; }

        .summary-box { margin-top: 30px; padding: 20px; background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 8px; }
        .summary-box h3 { margin-top: 0; color: #1e40af; font-size: 1.1em; }
        .summary-box p { font-size: 0.95em; line-height: 1.6; margin-bottom: 0; }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.8em; color: white; margin-left: 5px; }
    </style>
</head>
<body>

<div class="container">
    <h1>图着色算法博弈：单步开销 vs 全局效率</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>选择算法版本</label>
            <select id="algo-select">
                <option value="b0">B0: 基础回溯 (Baseline)</option>
                <option value="b1">B1: 向前检查 (FC)</option>
                <option value="b2">B2: FC + MRV</option>
                <option value="b3">B3: FC + MRV + Degree</option>
                <option value="b4">B4: FC + MRV + Degree + LCV</option>
                <option value="b5">B5: FC + MRV + Degree + LCV + Structured Pruning</option>
            </select>
        </div>
        <div class="control-group">
            <label>问题规模 (节点数 N)</label>
            <input type="range" id="size-range" min="100" max="450" value="450">
            <span id="size-val" style="text-align:right; font-size:0.8em;">450</span>
        </div>
        <div class="control-group">
            <label>约束密度 (Edge Density)</label>
            <input type="range" id="density-range" min="1" max="10" value="7">
            <span id="density-val" style="text-align:right; font-size:0.8em;">高密度</span>
        </div>
    </div>

    <div class="dashboard">
        <!-- Left: Search Tree Abstraction -->
        <div class="panel">
            <div class="panel-title">搜索空间模拟 (Search Tree)</div>
            <div id="tree-viz">
                <!-- SVG Tree will be injected here -->
            </div>
            <p style="font-size: 0.75em; color: #64748b; margin-top: 10px; text-align: center;">
                注：圆点代表算法探索的节点数量，分支代表搜索深度。
            </p>
        </div>

        <!-- Right: Metrics Comparison -->
        <div class="panel">
            <div class="panel-title">核心指标对比 (Metrics)</div>
            <div class="bar-container">
                <label>单步开销 (Overhead / ms)</label>
                <div class="bar-row">
                    <div class="bar-label">当前算法</div>
                    <div class="bar-wrapper"><div id="oh-bar" class="bar-fill"></div><span id="oh-text" class="bar-value">0</span></div>
                </div>
                
                <label>访问节点总数 (Node Count)</label>
                <div class="bar-row">
                    <div class="bar-label">当前算法</div>
                    <div class="bar-wrapper"><div id="nodes-bar" class="bar-fill"></div><span id="nodes-text" class="bar-value">0</span></div>
                </div>

                <label style="color: #e11d48; margin-top: 10px;">预测总耗时 (Total Runtime)</label>
                <div class="bar-row">
                    <div class="bar-label">当前算法</div>
                    <div class="bar-wrapper" style="background:#fff1f2;"><div id="total-bar" class="bar-fill" style="background:#fb7185;"></div><span id="total-text" class="bar-value">0</span></div>
                </div>
            </div>
        </div>
    </div>

    <div class="summary-box">
        <h3 id="algo-title">算法分析</h3>
        <p id="algo-desc">请选择一个算法版本来观察其在搜索树中的表现。</p>
    </div>
</div>

<script>
    const configData = {
        b0: { oh: 0.01, nodes: 1000000, color: '#cbd5e1', title: 'B0: 基础回溯', desc: '典型的“四肢发达，头脑简单”。单步开销极低，但没有任何剪枝，搜索空间呈指数级爆炸，在处理 450 个节点时极易卡死（Timeout）。' },
        b1: { oh: 0.05, nodes: 500000, color: '#fca5a5', title: 'B1: 向前检查 (FC)', desc: '引入了最基础的约束传播。虽然单步开销略微增加（检查邻居域），但通过提前发现死胡同，节点访问量减少了一半。' },
        b2: { oh: 0.25, nodes: 5000, color: '#93c5fd', title: 'B2: FC + MRV', desc: '性价比之王。通过动态选择可用颜色最少的节点（MRV），单步开销增加到 B1 的 5 倍，但回溯次数暴降 100 倍！这证明了“变量排序”的重要性。' },
        b3: { oh: 0.30, nodes: 3500, color: '#c4b5fd', title: 'B3: FC + MRV + Degree', desc: '在 MRV 的基础上，用 Degree 作为平局选择策略。它几乎不增加额外开销，却能优先处理约束更强的节点，常用于进一步减少回溯。' },
        b4: { oh: 1.20, nodes: 2000, color: '#fcd34d', title: 'B4: FC + MRV + Degree + LCV', desc: '在 B3 的基础上再加入 LCV 排序。虽然单步评估成本更高，但它会优先尝试对邻居影响最小的颜色，从而进一步压缩搜索树。' },
        b5: { oh: 1.50, nodes: 800, color: '#86efac', title: 'B5: FC + MRV + Degree + LCV + Structured Pruning', desc: '在 B4 基础上加入结构化剪枝，包括颜色对称性剪枝、团下界剪枝和连通分量分解。它的单步分析最重，但通常拥有最短的整体搜索路径。' }
    };

    const algoSelect = document.getElementById('algo-select');
    const sizeRange = document.getElementById('size-range');
    const densityRange = document.getElementById('density-range');
    const treeViz = document.getElementById('tree-viz');

    function update() {
        const algo = algoSelect.value;
        const data = configData[algo];
        const sizeFactor = sizeRange.value / 450;
        const densityFactor = densityRange.value / 7;

        // Update Text
        document.getElementById('size-val').innerText = sizeRange.value;
        document.getElementById('density-val').innerText = densityRange.value > 7 ? '高密度' : (densityRange.value < 4 ? '低密度' : '中密度');
        document.getElementById('algo-title').innerText = data.title;
        document.getElementById('algo-desc').innerText = data.desc;

        // Calculated Metrics
        const adjustedNodes = data.nodes * Math.pow(densityFactor, 2) * sizeFactor;
        const totalTime = adjustedNodes * data.oh / 1000;

        // Update Bars
        const maxNodes = 1000000;
        const maxOH = 1.5;
        const maxTime = 100;

        document.getElementById('oh-bar').style.width = (data.oh / maxOH * 100) + '%';
        document.getElementById('oh-bar').style.backgroundColor = data.color;
        document.getElementById('oh-text').innerText = data.oh.toFixed(2) + ' ms';

        document.getElementById('nodes-bar').style.width = (Math.min(adjustedNodes / maxNodes * 100, 100)) + '%';
        document.getElementById('nodes-bar').style.backgroundColor = data.color;
        document.getElementById('nodes-text').innerText = Math.round(adjustedNodes).toLocaleString();

        document.getElementById('total-bar').style.width = (Math.min(totalTime / maxTime * 100, 100)) + '%';
        document.getElementById('total-text').innerText = totalTime.toFixed(2) + ' s';

        // Draw Simulated Tree
        drawTree(algo, data.color);
    }

    function drawTree(algo, color) {
        treeViz.innerHTML = '';
        const isOptimized = (algo !== 'b0' && algo !== 'b1');
        const nodeCount = isOptimized ? 20 : 150;
        const spread = isOptimized ? 30 : 120;
        const depth = isOptimized ? 180 : 80;

        const svgNS = "http://www.w3.org/2000/svg";
        let svg = document.createElementNS(svgNS, "svg");
        svg.setAttribute("width", "100%");
        svg.setAttribute("height", "100%");
        svg.setAttribute("viewBox", "0 0 400 400");

        function createLine(x1, y1, x2, y2) {
            let line = document.createElementNS(svgNS, "line");
            line.setAttribute("x1", x1); line.setAttribute("y1", y1);
            line.setAttribute("x2", x2); line.setAttribute("y2", y2);
            line.setAttribute("stroke", "#cbd5e1");
            line.setAttribute("stroke-width", "1");
            return line;
        }

        function createCircle(x, y, r, fill) {
            let circle = document.createElementNS(svgNS, "circle");
            circle.setAttribute("cx", x); circle.setAttribute("cy", y);
            circle.setAttribute("r", r);
            circle.setAttribute("fill", fill);
            return circle;
        }

        // Draw root
        svg.appendChild(createCircle(200, 20, 5, color));

        if (!isOptimized) {
            // Complex, bushy tree
            for(let i=0; i<8; i++) {
                let x = 100 + i*30;
                svg.appendChild(createLine(200, 20, x, 100));
                for(let j=0; j<3; j++) {
                    let xj = x - 20 + j*20;
                    svg.appendChild(createLine(x, 100, xj, 200));
                    svg.appendChild(createCircle(xj, 200, 2, color));
                }
            }
        } else {
            // Narrow, deep tree
            let curX = 200;
            let curY = 20;
            for(let i=0; i<6; i++) {
                let nextX = curX + (Math.random()-0.5)*40;
                let nextY = curY + 50;
                svg.appendChild(createLine(curX, curY, nextX, nextY));
                svg.appendChild(createCircle(nextX, nextY, 4, color));
                curX = nextX; curY = nextY;
            }
        }
        
        treeViz.appendChild(svg);
    }

    algoSelect.onchange = update;
    sizeRange.oninput = update;
    densityRange.oninput = update;

    // Initial run
    update();
</script>

</body>
</html>
